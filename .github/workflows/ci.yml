name: CI

on:
  push:

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: novapos
          POSTGRES_USER: novapos
          POSTGRES_PASSWORD: novapos
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify
        run: mvn verify -pl Backend -Dspring.profiles.active=local --batch-mode
        env:
          NOVAPOS_DB_PASSWORD: novapos
