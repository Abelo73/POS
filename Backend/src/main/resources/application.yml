spring:
  application:
    name: novapos-backend

  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://localhost:5433/novapos
    username: novapos
    password: ${NOVAPOS_DB_PASSWORD:novapos}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations:
      - classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

novapos:
  modules:
    restaurant:
      enabled: false
  jwt:
    secret: ${NOVAPOS_JWT_SECRET:novapos-dev-secret-key-change-in-production}
    access-token-expiry: 900
    refresh-token-expiry: 86400

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    clean-disabled: false

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///novapos
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

---
spring:
  config:
    activate:
      on-profile: staging
  flyway:
    clean-disabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  flyway:
    clean-disabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
